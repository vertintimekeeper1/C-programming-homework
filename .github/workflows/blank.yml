name: C Compile and Run

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc
        run: sudo apt update && sudo apt install -y gcc

      - name: Compile and run
        run: |
          gcc *.c -o program
          ./program
