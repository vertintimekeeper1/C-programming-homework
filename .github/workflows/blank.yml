name: C Compile and Run

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc
        run: sudo apt update && sudo apt install -y gcc

      - name: Install MinGW (Windows cross compiler)
        run: sudo apt install -y gcc-mingw-w64

      - name: Compile for Windows
        run: |
          x86_64-w64-mingw32-gcc *.c -o program.exe
          ./program.exe

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: my-program-windows
          path: program.exe
